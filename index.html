<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto Planner Cloud</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    
    <style>
        :root {
            --primary: #556b2f;
            --primary-light: #6b8e23;
            --bg: #f5f5dc;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #dddddd;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --transition: all 0.2s ease;
            --danger: #c62828;
            --success: #2e7d32;
        }

        .dark-mode {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #e0e0e0;
            --text-light: #aaaaaa;
            --border: #444444;
            --primary: #8fb339;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- PANTALLA DE CARGA --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(0,0,0,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- DISEÑO --- */
        nav {
            width: 260px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .nav-logo { font-size: 1.4rem; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }

        .nav-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.8);
            padding: 14px 15px; text-align: left; cursor: pointer; border-radius: 8px;
            margin-bottom: 5px; font-size: 1rem; transition: var(--transition);
        }

        .nav-btn.active { background: rgba(255,255,255,0.2); color: white; }

        @media (max-width: 768px) {
            nav { position: fixed; height: 100%; transform: translateX(-100%); }
            nav.open { transform: translateX(0); }
        }

        main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; position: relative; }

        header {
            background: var(--card-bg); padding: 15px 20px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .window { display: none; }
        .window.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
        }

        .tab-group { display: flex; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 8px; }
        .tab { padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--text-light); }
        .tab.active { background: var(--primary); color: white; }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
        .btn-sm { padding: 6px 10px; font-size: 0.8rem; }

        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: #e0e0e0; color: #666; }
        .status-online { background: #dcfce7; color: #166534; }

        .meal-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card-bg); margin-bottom: 15px; }
        .meal-header { background: rgba(0,0,0,0.02); padding: 12px; font-weight: bold; }
        
        .food-item { display: flex; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--border); font-size: 0.9rem; }

        .nav-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 90;
        }
        .nav-overlay.open { display: block; }

        .menu-toggle {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 8px; cursor: pointer; display: none;
        }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="text-align: center;">
        <h3 style="margin: 0; color: var(--primary);">Keto Cloud</h3>
        <p id="load-msg" style="margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.6;">Cargando sistema...</p>
    </div>
</div>

<div class="nav-overlay" id="nav-overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div class="nav-logo"><span>Keto Cloud</span></div>
    <button class="nav-btn active" id="nav-dash" onclick="showWindow('dash')">📊 Información</button>
    <button class="nav-btn" id="nav-meals" onclick="showWindow('meals')">🍽️ Comidas</button>
    <button class="nav-btn" id="nav-config" onclick="showWindow('config')">⚙️ Ajustes</button>
</nav>

<main>
    <header>
        <div class="header-top">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div id="user-tabs" class="tab-group"></div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span id="sync-status" class="status-badge">Modo Local</span>
                <button class="btn btn-ghost btn-sm" onclick="toggleDarkMode()">🌓</button>
            </div>
        </div>
        <div id="week-pills" style="display:flex; gap:8px; overflow-x:auto;"></div>
    </header>

    <div class="content-area">
        <div id="window-dash" class="window active">
            <div class="card" style="background: var(--primary); color: white;">
                <h2 id="dash-title" style="margin: 0;">Hoy</h2>
                <p id="dash-date-label" style="opacity: 0.8; margin: 5px 0 0 0;"></p>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top: 15px;">
                <div class="card">
                    <h4 style="margin:0; font-size: 0.8rem; color: var(--text-light);">PROTEÍNA HOY</h4>
                    <div id="dash-prot-val" style="font-size: 1.5rem; font-weight: bold; margin-top: 5px;">0g</div>
                </div>
                <div class="card">
                    <h4 style="margin:0; font-size: 0.8rem; color: var(--text-light);">CALORÍAS HOY</h4>
                    <div id="dash-cal-val" style="font-size: 1.5rem; font-weight: bold; margin-top: 5px;">0</div>
                </div>
            </div>
        </div>

        <div id="window-meals" class="window">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin:0">Mis Comidas</h2>
                <button class="btn btn-primary btn-sm" onclick="addMeal()">+ Nueva</button>
            </div>
            <div id="day-selector" style="display:flex; gap:5px; overflow-x:auto; margin-bottom: 15px; padding-bottom: 5px;"></div>
            <div id="meals-container"></div>
        </div>

        <div id="window-config" class="window">
            <h2>Ajustes</h2>
            <div class="card">
                <h4>Sincronización Cloud</h4>
                <p style="font-size: 0.85rem; color: var(--text-light);">Para usar la nube, abre esta app desde el enlace compartido, no desde el archivo local.</p>
                <div id="id-box" style="display:none;">
                    <div style="background: #eee; padding: 10px; border-radius: 8px; font-family: monospace; font-weight: bold;" id="current-id"></div>
                </div>
            </div>
            <button class="btn btn-ghost" style="width:100%; color: var(--danger);" onclick="resetData()">Borrar todos los datos locales</button>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // --- CONFIGURACIÓN SEGURA ---
    let db = null;
    let auth = null;
    let isCloud = false;
    let appId = "local-app";

    const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    
    // Estado inicial
    const localSaved = JSON.parse(localStorage.getItem('keto_data_v1'));
    window.state = {
        currentUser: 'A',
        currentWeek: 1,
        currentDay: DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1],
        darkMode: localStorage.getItem('darkMode') === 'true',
        data: localSaved || {
            users: { A: { meals: {} }, B: { meals: {} } },
            weeks: [1]
        }
    };

    async function init() {
        // Verificar si existe configuración de Firebase (solo en servidor)
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {
                const config = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-app';
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);
                
                await signInAnonymously(auth);
                isCloud = true;
                
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'planners', 'global');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        window.state.data = snap.data();
                        renderAll();
                    } else {
                        saveData();
                    }
                    setSyncStatus(true);
                    hideLoader();
                });
            } catch (e) {
                console.warn("Error Cloud, usando Local.");
                startLocal();
            }
        } else {
            startLocal();
        }
    }

    function startLocal() {
        setSyncStatus(false);
        setTimeout(() => {
            renderAll();
            hideLoader();
        }, 500);
    }

    function hideLoader() {
        const loader = document.getElementById('loading-overlay');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    function setSyncStatus(online) {
        const badge = document.getElementById('sync-status');
        badge.innerText = online ? "En línea" : "Modo Local";
        badge.className = online ? 'status-badge status-online' : 'status-badge';
    }

    async function saveData() {
        localStorage.setItem('keto_data_v1', JSON.stringify(window.state.data));
        if (isCloud && auth?.currentUser) {
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'planners', 'global'), window.state.data);
            } catch (e) { console.error(e); }
        }
    }

    // Navegación y UI
    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('nav-overlay').classList.toggle('open');
    };

    window.showWindow = (id) => {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('window-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        if (window.innerWidth <= 768) toggleMenu();
    };

    window.switchUser = (u) => { window.state.currentUser = u; renderAll(); };
    window.switchDay = (d) => { window.state.currentDay = d; renderAll(); };
    window.toggleDarkMode = () => {
        window.state.darkMode = !window.state.darkMode;
        localStorage.setItem('darkMode', window.state.darkMode);
        renderAll();
    };

    window.addMeal = () => {
        const name = prompt("Nombre de la comida (ej: Desayuno):");
        if (!name) return;
        const user = window.state.data.users[window.state.currentUser];
        if (!user.meals[window.state.currentWeek]) user.meals[window.state.currentWeek] = [];
        user.meals[window.state.currentWeek].push({ 
            id: Date.now(), name, day: window.state.currentDay, foods: [] 
        });
        saveData();
        renderAll();
    };

    window.addFood = (mealIdx) => {
        const name = prompt("¿Qué vas a comer?");
        if (!name) return;
        const cal = parseInt(prompt("Calorías:", "0")) || 0;
        const prot = parseInt(prompt("Proteína (g):", "0")) || 0;
        
        window.state.data.users[window.state.currentUser].meals[window.state.currentWeek][mealIdx].foods.push({ name, cal, prot });
        saveData();
        renderAll();
    };

    window.resetData = () => {
        if(confirm("¿Seguro? Se borrará todo lo guardado en este móvil.")){
            localStorage.removeItem('keto_data_v1');
            location.reload();
        }
    };

    function renderAll() {
        document.body.className = window.state.darkMode ? 'dark-mode' : '';
        
        document.getElementById('user-tabs').innerHTML = ['A', 'B'].map(u => `
            <div class="tab ${window.state.currentUser === u ? 'active' : ''}" onclick="switchUser('${u}')">${u}</div>
        `).join('');

        document.getElementById('week-pills').innerHTML = window.state.data.weeks.map(w => `
            <div class="btn btn-sm ${window.state.currentWeek == w ? 'btn-primary' : 'btn-ghost'}">Sem. ${w}</div>
        `).join('');

        document.getElementById('day-selector').innerHTML = DAYS.map(d => `
            <button class="btn btn-sm ${window.state.currentDay === d ? 'btn-primary' : 'btn-ghost'}" onclick="switchDay('${d}')">${d.substring(0,3)}</button>
        `).join('');

        const user = window.state.data.users[window.state.currentUser];
        const weekMeals = user.meals[window.state.currentWeek] || [];
        const todayMeals = weekMeals.filter(m => m.day === window.state.currentDay);

        let tCal = 0, tProt = 0;
        todayMeals.forEach(m => m.foods.forEach(f => { tCal += f.cal; tProt += f.prot; }));

        document.getElementById('dash-title').innerText = window.state.currentDay;
        document.getElementById('dash-date-label').innerText = `Semana ${window.state.currentWeek}`;
        document.getElementById('dash-cal-val').innerText = tCal;
        document.getElementById('dash-prot-val').innerText = tProt + "g";

        document.getElementById('meals-container').innerHTML = todayMeals.map((m) => {
            const mIdx = weekMeals.indexOf(m);
            return `
            <div class="meal-card">
                <div class="meal-header">${m.name}</div>
                ${m.foods.map(f => `
                    <div class="food-item">
                        <span>${f.name}</span>
                        <span style="opacity:0.6">${f.cal} cal | ${f.prot}g prot</span>
                    </div>
                `).join('')}
                <div style="padding:10px">
                    <button class="btn btn-sm btn-ghost" style="width:100%" onclick="addFood(${mIdx})">+ Añadir Alimento</button>
                </div>
            </div>`;
        }).join('') || '<p style="text-align:center; opacity:0.5;">No hay comidas hoy</p>';
    }

    init();
</script>
</body>
</html>
